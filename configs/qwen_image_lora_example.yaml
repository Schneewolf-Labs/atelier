# Example: train a Qwen-Image text-to-image LoRA.
#
# Run with:
#   python -m atelier.train --config configs/qwen_image_lora_example.yaml
#
# Override any field on the CLI without editing the file:
#   python -m atelier.train --config configs/qwen_image_lora_example.yaml \
#       --set training.num_epochs=2 \
#       --set training.output_dir=./output-quick

model:
  pretrained: "Qwen/Qwen-Image"
  adapter: "qwen_image"
  adapter_args:
    defer_transformer: true

dataset:
  jsonl: "~/flammen-lora-dataset/train.jsonl"
  max_samples: null

loss:
  type: "flow_matching"
  args:
    weighting_scheme: "none"

peft:
  type: "lora"
  r: 32
  lora_alpha: 64
  target_modules: ["to_k", "to_q", "to_v", "to_out.0"]
  lora_dropout: 0.05
  init_lora_weights: "gaussian"
  # DoRA (Weight-Decomposed Low-Rank Adaptation) — decomposes the LoRA
  # update into a magnitude vector + a directional matrix. Modest extra
  # compute (~5-10% slower step) for meaningfully higher quality on
  # small/medium aesthetic datasets where vanilla LoRA can underfit
  # the target style. Requires peft >= 0.10. Flip to true to try.
  use_dora: false

cache:
  enable: true
  dir: "./output/cache"
  target_area: 1048576   # 1024 × 1024

training:
  output_dir: "./output"
  num_epochs: 8
  batch_size: 1
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  gradient_checkpointing: true
  optimizer: "adafactor"
  lr_scheduler: "cosine"
  logging_steps: 10
  save_steps: 500
  save_total_limit: 3
  save_on_epoch_end: true
  seed: 42
